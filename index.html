<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pink Mini Game 💗</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e7, #ffeef7);
    text-align: center;
    color: #333;
  }

  .card {
    margin-top: 80px;
    background: white;
    width: 80%;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  h2 {
    color: #ff4d88;
  }

  input {
    padding: 10px;
    width: 80%;
    border-radius: 10px;
    border: 1px solid #ffb6d5;
    outline: none;
  }

  button {
    margin: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.05);
  }

  .yes {
    background: #ff4d88;
    color: white;
  }

  .no {
    background: #999;
    color: white;
  }

  #flowers {
    display: none;
    font-size: 28px;
    margin-top: 20px;
    animation: pop 0.6s ease-in-out;
  }

  @keyframes pop {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }

  #message {
    margin-top: 20px;
    font-size: 18px;
    font-weight: bold;
    color: #ff4d88;
  }
</style>
</head>

<body>

<div class="card">

  <!-- STEP 1 -->
  <div id="step1">
    <h2>Hi 💗 How are you?</h2>
    <input type="text" id="how">
    <br>
    <button class="yes" onclick="step2()">Send</button>
  </div>

  <!-- STEP 2 -->
  <div id="step2" style="display:none;">
    <h2>wanna play a game? 🎮</h2>
    <button class="yes" onclick="step3()">Yes</button>
    <button class="no" onclick="endGame()">No</button>
  </div>

  <!-- STEP 3 -->
  <div id="step3" style="display:none;">
    <h2>Do you love me? 💕</h2>
    <button class="yes" onclick="loveYes()">Yes</button>
    <button class="no" onclick="loveNo()">No</button>
  </div>

  <!-- FLOWERS -->
  <div id="flowersSection" style="display:none;">
    <h2>Take flowers bcz you're a good boy 🌸</h2>
    <button class="yes" onclick="showFlowers()">Take flowers</button>
  </div>

  <div id="flowers"></div>

  <div id="message"></div>

</div>

<script>

function step2() {
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

function endGame() {
  document.getElementById("message").innerHTML = "Okay… maybe next time 💔🙂";
}

function step3() {
  document.getElementById("step2").style.display = "none";
  document.getElementById("step3").style.display = "block";
}

function loveYes() {
  document.getElementById("message").innerHTML = "Yeyyy I love you too 💖";
  document.getElementById("flowersSection").style.display = "block";
}

function loveNo() {
  document.getElementById("message").innerHTML = "uww 😭 how dare you";
  document.getElementById("flowersSection").style.display = "block";
}

function showFlowers() {
  document.getElementById("flowers").style.display = "block";

  document.getElementById("flowers").innerHTML =
    "🌸🌷🌸🌺🌸🌼🌸🌷🌸🌺🌸🌼<br><br>Good boy 💗";

  document.getElementById("message").innerHTML =
    "You are loved, appreciated, and you're doing better than you think 💫💗";
}

</script>

</body>
</html>
